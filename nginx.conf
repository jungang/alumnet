server {
    listen 80;
    server_name localhost;
    
    # 客户端最大上传大小
    client_max_body_size 50m;

    # 触控展示端
    location /xyl {
        alias /usr/share/nginx/html/xyl;
        index index.html;
        try_files $uri $uri/ /xyl/index.html;
        
        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 后台管理端
    location /xyl/admin {
        alias /usr/share/nginx/html/xyl/admin;
        index index.html;
        try_files $uri $uri/ /xyl/admin/index.html;
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API代理
    location /xyl/api {
        rewrite ^/xyl/api(.*)$ /api$1 break;
        proxy_pass http://xyl-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # 上传文件访问
    location /xyl/uploads {
        alias /usr/share/nginx/html/xyl/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    # 健康检查
    location /health {
        proxy_pass http://xyl-app:3000/health;
    }
}
