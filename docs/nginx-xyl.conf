# ============================================
# 宝塔Nginx配置 - 校友查询系统
# ============================================
# 将以下配置添加到宝塔面板的站点配置中
# 位置：网站 -> 设置 -> 配置文件
# 添加到 server { } 块内
# 
# 重要：使用 ^~ 前缀确保优先匹配，避免被全局正则规则拦截
# ============================================

# 校友查询系统 - 触控展示端（Vue SPA）
location ^~ /xyl {
    alias /www/wwwroot/default/xyl/client;
    index index.html;
    try_files $uri $uri/ /xyl/index.html;
}

# 校友查询系统 - 后台管理端（Vue SPA）
location ^~ /xyl/admin {
    alias /www/wwwroot/default/xyl/admin;
    index index.html;
    try_files $uri $uri/ /xyl/admin/index.html;
}

# 校友查询系统 - API反向代理到Docker容器
location ^~ /xyl/api {
    rewrite ^/xyl/api(.*)$ /api$1 break;
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
    client_max_body_size 50m;
}

# 校友查询系统 - 上传文件访问
location ^~ /xyl/uploads {
    alias /www/wwwroot/default/xyl/server/uploads;
    expires 30d;
    add_header Cache-Control "public, immutable";
    add_header Access-Control-Allow-Origin *;
}
