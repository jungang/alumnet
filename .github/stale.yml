name: 'Close stale issues and PRs'
on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 7
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs.'
          close-issue-message: 'This issue has been automatically closed because it became stale.'
          stale-pr-message: 'This PR has been automatically marked as stale because it has not had recent activity.'
          close-pr-message: 'This PR has been automatically closed because it became stale.'
          days-before-pr-stale: 90
          days-before-pr-close: 21
